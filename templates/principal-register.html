<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Principal Registration</title>

<style>
:root{
    --primary:#0f766e;
}
*{box-sizing:border-box;}
body{
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.box{
    background:#fff;
    width:560px;
    padding:60px;
    border-radius:18px;
}
input{
    width:100%;
    padding:14px;
    margin:10px 0;
}
button{
    width:100%;
    padding:14px;
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:8px;
}
.footer{
    text-align:center;
    margin-top:25px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Principal Registration</h2>

    <form id="registerForm">
        <input name="instituteCode" placeholder="Institute Code" required>
        <input name="principalName" placeholder="Principal Name" required>
        <input name="instituteName" placeholder="Institute Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input name="contact" placeholder="Contact Number" required>
        <input type="password" name="passwordNew" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <p id="msg"></p>

    <div class="footer">
        Already registered?
        <!-- ✅ CORRECT LINK -->
        <a href="/?role=principal">Login here</a>
    </div>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit",function(e){
    e.preventDefault();

    fetch("/api/register/principal",{
        method:"POST",
        body:new FormData(this)
    })
    .then(res=>res.text())
    .then(data=>{
        if(data.trim()==="success"){
            document.getElementById("msg").innerText="Registered successfully";
            setTimeout(()=>{ window.location.href="/?role=principal"; },1500);
        }else{
            document.getElementById("msg").innerText=data;
        }
    });
});
</script>

</body>
</html>
