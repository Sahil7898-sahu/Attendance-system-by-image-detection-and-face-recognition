<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans">
    <nav class="bg-slate-900 text-white shadow-lg p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-id-badge text-blue-400 text-2xl"></i>
                <span class="text-xl font-bold">ATTENDANCE<span class="text-blue-400">PRO</span></span>
            </div>
            <div class="space-x-6">
                <a href="{{ url_for('attendance') }}" class="hover:text-blue-400">Mark Attendance</a>
                <a href="{{ url_for('register') }}" class="hover:text-blue-400">Register Student</a>
                <a href="{{ url_for('dashboard') }}" class="hover:text-blue-400">Dashboard</a>
                <a href="{{ url_for('logout') }}" class="text-red-400 border border-red-400 px-3 py-1 rounded">Logout</a>
            </div>
        </div>
    </nav>
    <div class="max-w-7xl mx-auto px-4 py-8">
        {% with messages = get_flashed_messages() %}{% if messages %}{% for m in messages %}
        <div class="mb-4 p-4 bg-blue-100 border-l-4 border-blue-500 text-blue-700">{{ m }}</div>
        {% endfor %}{% endif %}{% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
